<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 900" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <!-- background -->
  <rect x="0" y="0" width="1240" height="900" fill="#eef2f6"/>
  <rect x="16" y="16" width="1208" height="868" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- title -->
  <text x="40" y="54" font-size="25" font-weight="700" fill="#0f172a">Virtual_Server — Homelab Network Architecture</text>
  <text x="40" y="80" font-size="14" fill="#64748b">Proxmox VE 9.2.4 · bare-metal hypervisor "uno" · isolated cyber-lab range behind pfSense</text>

  <!-- ===== top row: internet, router, remote client ===== -->
  <!-- internet -->
  <rect x="90" y="104" width="170" height="50" rx="25" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="175" y="134" font-size="14" font-weight="600" fill="#334155" text-anchor="middle">Internet / WAN</text>

  <!-- home router -->
  <rect x="320" y="104" width="200" height="50" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
  <text x="420" y="127" font-size="13.5" font-weight="600" fill="#334155" text-anchor="middle">Home Router / Gateway</text>
  <text x="420" y="145" font-size="12.5" fill="#64748b" text-anchor="middle">10.0.0.1</text>

  <!-- remote admin client -->
  <rect x="960" y="104" width="220" height="50" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="1070" y="127" font-size="13" font-weight="600" fill="#166534" text-anchor="middle">Remote admin (laptop / phone)</text>
  <text x="1070" y="145" font-size="12" fill="#15803d" text-anchor="middle">WireGuard client · 10.6.0.2</text>

  <!-- internet -> router -->
  <line x1="260" y1="129" x2="320" y2="129" stroke="#94a3b8" stroke-width="2"/>

  <!-- ===== proxmox host container ===== -->
  <rect x="48" y="188" width="1144" height="626" rx="14" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="66" y="214" font-size="15" font-weight="700" fill="#334155">Proxmox VE host — node "uno"  ·  Web UI 10.0.0.44:8006</text>

  <!-- nic0 -->
  <rect x="374" y="232" width="92" height="30" rx="6" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
  <text x="420" y="252" font-size="12" font-weight="600" fill="#334155" text-anchor="middle">nic0 (phys)</text>
  <!-- router -> nic0 -->
  <line x1="420" y1="154" x2="420" y2="232" stroke="#475569" stroke-width="2"/>

  <!-- vmbr0 bar -->
  <rect x="80" y="292" width="1080" height="46" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="100" y="320" font-size="14.5" font-weight="700" fill="#1e40af">vmbr0  ·  WAN / home LAN  ·  10.0.0.0/24  ·  uplink via nic0</text>
  <!-- nic0 -> vmbr0 -->
  <line x1="420" y1="262" x2="420" y2="292" stroke="#475569" stroke-width="2"/>

  <!-- boxes under vmbr0 -->
  <!-- proxmox mgmt -->
  <rect x="96" y="384" width="214" height="66" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="203" y="408" font-size="13.5" font-weight="600" fill="#166534" text-anchor="middle">Proxmox Web UI</text>
  <text x="203" y="426" font-size="12" fill="#15803d" text-anchor="middle">:8006 · 10.0.0.44</text>
  <text x="203" y="442" font-size="10.5" font-weight="700" fill="#16a34a" text-anchor="middle">BUILT</text>
  <line x1="203" y1="338" x2="203" y2="384" stroke="#2563eb" stroke-width="1.8"/>

  <!-- wireguard lxc -->
  <rect x="340" y="384" width="250" height="66" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="465" y="406" font-size="13.5" font-weight="600" fill="#166534" text-anchor="middle">WireGuard VPN · LXC</text>
  <text x="465" y="423" font-size="12" fill="#15803d" text-anchor="middle">VM 100 · 10.0.0.121 · SSH-key only</text>
  <text x="465" y="440" font-size="12" fill="#15803d" text-anchor="middle">VPN server 10.6.0.1  ·  BUILT</text>
  <line x1="430" y1="338" x2="430" y2="384" stroke="#2563eb" stroke-width="1.8"/>

  <!-- pfSense (spans vmbr0 -> vmbr1) -->
  <rect x="648" y="366" width="300" height="228" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
  <text x="798" y="392" font-size="15" font-weight="700" fill="#92400e" text-anchor="middle">pfSense · VM 101</text>
  <text x="798" y="411" font-size="12.5" fill="#b45309" text-anchor="middle">Firewall + Router</text>
  <text x="798" y="428" font-size="11" font-weight="700" fill="#d97706" text-anchor="middle">IN PROGRESS</text>
  <!-- WAN interface tag -->
  <rect x="676" y="444" width="244" height="30" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="1.2"/>
  <text x="798" y="464" font-size="12" font-weight="600" fill="#92400e" text-anchor="middle">WAN · vtnet0 → vmbr0 (net0)</text>
  <!-- LAN interface tag -->
  <rect x="676" y="530" width="244" height="30" rx="6" fill="#fffbeb" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="798" y="550" font-size="12" font-weight="600" fill="#5b21b6" text-anchor="middle">LAN · vtnet1 → vmbr1 (net1)</text>
  <!-- vmbr0 -> pfSense WAN -->
  <line x1="798" y1="338" x2="798" y2="366" stroke="#2563eb" stroke-width="2.2"/>

  <!-- vmbr1 bar (isolated) -->
  <rect x="80" y="612" width="1080" height="46" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="1 0"/>
  <text x="100" y="640" font-size="14.5" font-weight="700" fill="#5b21b6">vmbr1  ·  ISOLATED lab LAN  ·  10.10.10.0/24  ·  no physical uplink</text>
  <!-- pfSense LAN -> vmbr1 -->
  <line x1="798" y1="594" x2="798" y2="612" stroke="#7c3aed" stroke-width="2.2"/>

  <!-- lab VMs (planned) -->
  <g stroke-dasharray="6 4">
    <rect x="112" y="694" width="216" height="70" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.8"/>
    <rect x="356" y="694" width="216" height="70" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.8"/>
    <rect x="600" y="694" width="216" height="70" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.8"/>
    <rect x="844" y="694" width="216" height="70" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.8"/>
  </g>
  <text x="220" y="722" font-size="13.5" font-weight="600" fill="#475569" text-anchor="middle">Kali Linux</text>
  <text x="220" y="740" font-size="12" fill="#64748b" text-anchor="middle">attacker</text>
  <text x="220" y="756" font-size="10.5" font-weight="700" fill="#94a3b8" text-anchor="middle">PLANNED</text>

  <text x="464" y="722" font-size="13.5" font-weight="600" fill="#475569" text-anchor="middle">Windows target</text>
  <text x="464" y="740" font-size="12" fill="#64748b" text-anchor="middle">victim / testing</text>
  <text x="464" y="756" font-size="10.5" font-weight="700" fill="#94a3b8" text-anchor="middle">PLANNED</text>

  <text x="708" y="722" font-size="13.5" font-weight="600" fill="#475569" text-anchor="middle">Linux target</text>
  <text x="708" y="740" font-size="12" fill="#64748b" text-anchor="middle">admin / services</text>
  <text x="708" y="756" font-size="10.5" font-weight="700" fill="#94a3b8" text-anchor="middle">PLANNED</text>

  <text x="952" y="722" font-size="13.5" font-weight="600" fill="#475569" text-anchor="middle">Metasploitable</text>
  <text x="952" y="740" font-size="12" fill="#64748b" text-anchor="middle">vulnerable box</text>
  <text x="952" y="756" font-size="10.5" font-weight="700" fill="#94a3b8" text-anchor="middle">PLANNED</text>

  <!-- vmbr1 -> lab VMs -->
  <g stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="5 4">
    <line x1="220" y1="658" x2="220" y2="694"/>
    <line x1="464" y1="658" x2="464" y2="694"/>
    <line x1="708" y1="658" x2="708" y2="694"/>
    <line x1="952" y1="658" x2="952" y2="694"/>
  </g>

  <!-- ===== WireGuard remote tunnel ===== -->
  <polyline points="1070,154 1070,360 500,360 500,384" fill="none" stroke="#16a34a" stroke-width="2.2" stroke-dasharray="7 5"/>
  <text x="828" y="352" font-size="12.5" font-weight="600" fill="#15803d" text-anchor="middle">WireGuard tunnel · 10.6.0.0/24 · secure remote access (port 51820)</text>

  <!-- ===== legend ===== -->
  <rect x="48" y="836" width="18" height="18" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="74" y="850" font-size="13" fill="#334155">Built / operational</text>

  <rect x="228" y="836" width="18" height="18" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="254" y="850" font-size="13" fill="#334155">In progress (pfSense)</text>

  <rect x="430" y="836" width="18" height="18" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.8" stroke-dasharray="4 3"/>
  <text x="456" y="850" font-size="13" fill="#334155">Planned</text>

  <rect x="560" y="836" width="18" height="18" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="586" y="850" font-size="13" fill="#334155">Bridge / network segment</text>

  <line x1="762" y1="845" x2="800" y2="845" stroke="#16a34a" stroke-width="2.2" stroke-dasharray="7 5"/>
  <text x="808" y="850" font-size="13" fill="#334155">VPN tunnel</text>
</svg>
