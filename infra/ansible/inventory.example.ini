# Copy to inventory.ini (git-ignored) and set the real 10.10.10.x addresses
# that pfSense DHCP hands out to the lab VMs.
#
# NOTE: the lab network (vmbr1) is ISOLATED — run Ansible from a host that sits
# ON that network (e.g. the Kali box itself, or a jump host with a leg on vmbr1).

[attackers]
kali ansible_host=10.10.10.101 ansible_user=kali

[targets]
metasploitable ansible_host=10.10.10.102 ansible_user=msfadmin

[lab:children]
attackers
targets

[lab:vars]
ansible_python_interpreter=auto_silent
